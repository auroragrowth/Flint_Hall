<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Events · Flint Hall Events</title>
<meta name="description" content="A look through past events at Flint Hall — weddings, retreats, proms and team days held at our rustic Suffolk venue.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Libre+Baskerville:ital,wght@0,400;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@500;600&display=swap" rel="stylesheet">

<style>
:root {
  --rust: #8C4A2F;
  --brown-dk: #4A2F23;
  --paper: #f3e3c1;
  --paper-light: #f8edd0;
  --paper-warm: #ead7af;
  --paper-edge: #d4ba8c;
  --leather: #3d2817;
  --ash-cream: #F1E6CF;
  --copper: #B8924A;
  --gold: #c89c5a;
  --gold-soft: #d8b87c;
  --ink: #3a2818;
  --ink-soft: #5c4530;
  --ink-faded: #806555;

  --display: 'Cinzel', Georgia, serif;
  --serif: 'Libre Baskerville', Georgia, serif;
  --body: 'Lora', Georgia, serif;
  --ui: 'Montserrat', system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }
body {
  font-family: var(--body); font-size: 16px; line-height: 1.65;
  color: var(--ink); background: var(--paper-warm);
  min-height: 100vh; display: flex; flex-direction: column;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
::selection { background: var(--rust); color: var(--paper-light); }

/* Paper bg */
.paper-bg {
  position: relative;
  background-color: var(--paper-warm);
  background-image:
    radial-gradient(ellipse 100% 60% at 50% 0%, rgba(212,186,140,0.45), transparent 70%),
    radial-gradient(ellipse 100% 50% at 50% 100%, rgba(74,47,35,0.10), transparent 70%);
  flex: 1; display: flex; flex-direction: column;
}
.paper-bg::before {
  content: ''; position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.27 0 0 0 0 0.18 0 0 0 0 0.10 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  background-size: 240px 240px; pointer-events: none; opacity: 0.55;
  mix-blend-mode: multiply; z-index: 1;
}
.paper-bg > * { position: relative; z-index: 2; }

/* Top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 32px;
  border-bottom: 1px solid rgba(184,146,74,0.30);
  background: rgba(243,227,193,0.55);
  backdrop-filter: blur(4px);
}
.topbar-logo img { display: block; height: 44px; width: auto; }
.topbar-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--ui); font-size: 11px; font-weight: 600;
  letter-spacing: 0.24em; text-transform: uppercase;
  color: var(--brown-dk);
  padding: 8px 16px;
  border: 1px solid rgba(140,74,47,0.30); border-radius: 4px;
  transition: all 0.2s ease;
}
.topbar-link svg { width: 14px; height: 14px; }
.topbar-link:hover { background: rgba(140,74,47,0.06); border-color: var(--rust); color: var(--rust); }
@media (max-width: 600px) {
  .topbar { padding: 16px 18px; }
  .topbar-logo img { height: 36px; }
  .topbar-link { padding: 7px 12px; font-size: 10px; letter-spacing: 0.20em; }
}

/* Hero */
.hero { padding: 80px 24px 36px; text-align: center; max-width: 880px; margin: 0 auto; }
.eyebrow {
  display: inline-block;
  font-family: var(--ui); font-size: 11px; font-weight: 600;
  letter-spacing: 0.42em; text-transform: uppercase;
  color: var(--rust); margin-bottom: 18px;
}
h1 {
  font-family: var(--display);
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--brown-dk);
  margin-bottom: 8px; line-height: 1.05;
}
.lead {
  font-family: var(--serif); font-style: italic;
  font-size: clamp(16px, 2vw, 19px); line-height: 1.55;
  color: var(--ink-soft); margin: 16px auto 0; max-width: 640px;
}
.divider { width: 80px; height: 1px; background: var(--copper); margin: 28px auto; position: relative; }
.divider::before, .divider::after {
  content: ''; position: absolute; top: 50%;
  width: 6px; height: 6px; border: 1px solid var(--copper);
  border-radius: 50%; transform: translateY(-50%) rotate(45deg);
}
.divider::before { left: -10px; }
.divider::after { right: -10px; }

/* Grid */
main { flex: 1; padding: 0 24px 80px; max-width: 1320px; margin: 0 auto; width: 100%; }
@media (max-width: 600px) { main { padding: 0 14px 60px; } }

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 540px) { .grid { grid-template-columns: 1fr; } }

.tile {
  position: relative; aspect-ratio: 4/3; overflow: hidden;
  background: var(--leather);
  border: 1px solid var(--paper-edge);
  cursor: zoom-in;
  box-shadow: 0 1px 0 rgba(255,243,210,0.6) inset, 0 6px 20px rgba(74,47,35,0.20);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.tile:hover { transform: translateY(-3px); box-shadow: 0 1px 0 rgba(255,243,210,0.6) inset, 0 14px 32px rgba(74,47,35,0.32); }
.tile img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  filter: saturate(0.92) contrast(1.04);
  display: block;
}
.tile::after {
  content: ''; position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.65 0 0 0 0 0.40 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23g)'/></svg>");
  background-size: 100px 100px; mix-blend-mode: overlay; opacity: 0.55; pointer-events: none;
}
.tile .caption {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 18px 22px;
  background: linear-gradient(0deg, rgba(31,26,23,0.85) 0%, transparent 100%);
  color: var(--paper-light);
  font-family: var(--display); font-size: 12.5px;
  letter-spacing: 0.20em; text-transform: uppercase;
  z-index: 3;
}

.empty {
  text-align: center; padding: 80px 24px;
  font-family: var(--serif); font-style: italic;
  color: var(--ink-soft); font-size: 16px;
}
.empty p { margin: 6px 0; }

.loader {
  display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 80px 0;
}
.loader-spin {
  width: 32px; height: 32px;
  border: 2px solid rgba(140,74,47,0.20);
  border-top-color: var(--rust); border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text {
  font-family: var(--serif); font-style: italic; color: var(--ink-soft); font-size: 14px;
}

/* Lightbox */
.lightbox {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(20,12,6,0.94);
  display: none; align-items: center; justify-content: center;
  padding: 24px;
}
.lightbox.active { display: flex; }
.lightbox img {
  max-width: 92vw; max-height: 84vh; display: block;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  border: 1px solid rgba(232,200,150,0.30);
  filter: saturate(0.95) contrast(1.04);
}
.lightbox .lb-caption {
  position: absolute; left: 0; right: 0; bottom: 36px; text-align: center;
  font-family: var(--display); color: var(--gold-soft);
  font-size: 13px; letter-spacing: 0.24em; text-transform: uppercase;
  text-shadow: 0 1px 4px rgba(0,0,0,0.7);
}
.lightbox .lb-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  color: var(--paper-light);
  border: 1px solid rgba(232,200,150,0.40); border-radius: 50%;
  background: rgba(20,12,6,0.6);
  transition: all 0.2s ease;
}
.lightbox .lb-btn:hover { background: rgba(20,12,6,0.85); border-color: var(--gold); color: var(--gold-soft); }
.lightbox .lb-prev { left: 28px; }
.lightbox .lb-next { right: 28px; }
.lightbox .lb-close {
  top: 28px; right: 28px; transform: none;
}
@media (max-width: 600px) {
  .lightbox .lb-btn { width: 44px; height: 44px; }
  .lightbox .lb-prev { left: 12px; }
  .lightbox .lb-next { right: 12px; }
  .lightbox .lb-close { top: 16px; right: 16px; }
}

.foot {
  text-align: center; padding: 28px 24px 36px;
  font-family: var(--ui); font-size: 11px; letter-spacing: 0.18em;
  color: var(--ink-faded);
}
[hidden] { display: none !important; }
</style>
</head>

<body>
<div class="paper-bg">

  <header class="topbar">
    <a class="topbar-logo" href="/" aria-label="Flint Hall Events — Home">
      <img src="photos/logo-dark.webp" alt="Flint Hall Events">
    </a>
    <a class="topbar-link" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to site
    </a>
  </header>

  <section class="hero">
    <span class="eyebrow">From past events</span>
    <h1>Moments at Flint Hall</h1>
    <p class="lead">A few of our favourite frames — weddings, retreats and quiet evenings under a stretched sky.</p>
    <div class="divider"></div>
  </section>

  <main>
    <div id="loader" class="loader">
      <div class="loader-spin"></div>
      <div class="loader-text">Pulling photos&hellip;</div>
    </div>
    <div id="grid" class="grid" hidden></div>
    <div id="empty" class="empty" hidden>
      <p>The gallery&rsquo;s being curated &mdash; check back soon.</p>
      <p style="font-size: 14px; margin-top: 14px;">Or peek at the <a href="/" style="color: var(--rust); border-bottom: 1px solid var(--rust);">main page</a> for a taste of the venue.</p>
    </div>
  </main>

  <p class="foot">Flint Hall Events &middot; Suffolk</p>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="lb-btn lb-close" id="lb-close" aria-label="Close">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <button class="lb-btn lb-prev" id="lb-prev" aria-label="Previous">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="lb-btn lb-next" id="lb-next" aria-label="Next">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <img id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

const SUPABASE_URL = 'https://dgrbazpcytwusnsvoaou.supabase.co';
const SUPABASE_KEY = 'sb_publishable_C5jAgpcN560Eg1zRqFU62g_Es8zRT_t';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = id => document.getElementById(id);
const escapeHtml = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const publicUrl = (path) => `${SUPABASE_URL}/storage/v1/object/public/gallery/${path}`;

let photos = [];
let lbIndex = 0;

async function load() {
  const { data, error } = await supabase
    .from('gallery_photos')
    .select('id, storage_path, caption, event_year, event_month, display_order')
    .order('display_order', { ascending: false })
    .order('created_at', { ascending: false });

  $('loader').hidden = true;
  if (error) {
    console.warn('Gallery load failed:', error);
    $('empty').hidden = false;
    return;
  }
  photos = data || [];
  if (!photos.length) {
    $('empty').hidden = false;
    return;
  }
  render();
}

function render() {
  const grid = $('grid');
  grid.hidden = false;
  grid.innerHTML = photos.map((p, i) => `
    <button class="tile" data-i="${i}" type="button" aria-label="Open photo${p.caption ? ': ' + escapeHtml(p.caption) : ''}">
      <img src="${publicUrl(p.storage_path)}" alt="${escapeHtml(p.caption || '')}" loading="lazy" decoding="async">
      ${p.caption ? `<div class="caption">${escapeHtml(p.caption)}</div>` : ''}
    </button>
  `).join('');
  grid.querySelectorAll('.tile').forEach(t => {
    t.addEventListener('click', () => openLb(Number(t.dataset.i)));
  });
}

// Lightbox
const lb = $('lightbox');
function openLb(i) {
  lbIndex = i;
  showLb();
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  lb.classList.remove('active');
  document.body.style.overflow = '';
}
function showLb() {
  const p = photos[lbIndex];
  if (!p) return;
  $('lb-img').src = publicUrl(p.storage_path);
  $('lb-img').alt = p.caption || '';
  $('lb-caption').textContent = p.caption || '';
}
function nextLb() { lbIndex = (lbIndex + 1) % photos.length; showLb(); }
function prevLb() { lbIndex = (lbIndex - 1 + photos.length) % photos.length; showLb(); }

$('lb-close').addEventListener('click', closeLb);
$('lb-next').addEventListener('click', nextLb);
$('lb-prev').addEventListener('click', prevLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape')      closeLb();
  else if (e.key === 'ArrowRight') nextLb();
  else if (e.key === 'ArrowLeft')  prevLb();
});

load();
</script>
</body>
</html>
